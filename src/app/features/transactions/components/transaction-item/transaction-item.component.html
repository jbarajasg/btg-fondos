<!-- ================================================
  transaction-item.component.html
  ================================================ -->

<div class="flex items-center justify-between gap-4 py-4 border-b border-gray-100 last:border-0">
  <!-- Icono y datos -->
  <div class="flex items-center gap-3">
    <!-- Icono según tipo de transacción -->
    <div
      [class]="
        'w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 ' +
        (isSubscription() ? 'bg-red-50' : 'bg-green-50')
      "
    >
      <span class="text-lg">{{ isSubscription() ? '📥' : '📤' }}</span>
    </div>

    <!-- Nombre y fecha -->
    <div class="flex flex-col gap-0.5">
      <span class="text-sm font-medium text-gray-900 leading-tight">
        {{ transaction().fundName }}
      </span>
      <div class="flex items-center gap-2">
        <span [class]="'text-xs px-2 py-0.5 rounded-full font-medium ' + badgeClass()">
          {{ typeLabel() }}
        </span>
        <span class="text-xs text-gray-400">{{ formattedDate() }}</span>
      </div>
    </div>
  </div>

  <!-- Monto y notificación -->
  <div class="flex flex-col items-end gap-0.5 flex-shrink-0">
    <span [class]="'text-sm font-bold ' + amountClass()">
      {{ amountPrefix() }} {{ transaction().amount | copCurrency }}
    </span>
    <span class="text-xs text-gray-400">
      {{ transaction().notificationMethod === 'email' ? '✉️ Email' : '📱 SMS' }}
    </span>
  </div>
</div>
