<div
  class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 flex flex-col gap-4 hover:shadow-md transition-all duration-200"
>
  <div class="flex items-start justify-between gap-3">
    <h3 class="text-sm font-semibold text-gray-900 leading-tight">
      {{ activeFund().fundName }}
    </h3>
    <span class="badge badge-success flex-shrink-0">Activo</span>
  </div>

  <div class="flex flex-col gap-2">
    <div class="flex justify-between items-center">
      <span class="text-xs text-gray-500">Monto invertido</span>
      <span class="text-sm font-bold text-gray-900">
        {{ activeFund().subscribedAmount | copCurrency }}
      </span>
    </div>
    <div class="flex justify-between items-center">
      <span class="text-xs text-gray-500">Fecha de suscripción</span>
      <span class="text-xs text-gray-600">{{ subscribedDate() }}</span>
    </div>
  </div>

  <button class="btn-danger w-full" [disabled]="isLoading()" (click)="onCancel()">
    @if (isLoading()) {
      <span
        class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"
      ></span>
      Procesando...
    } @else {
      Cancelar suscripción
    }
  </button>
</div>
