<div
  class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 flex flex-col gap-4 hover:shadow-md hover:-translate-y-0.5 transition-all duration-200"
>
  <div class="flex items-start justify-between gap-3">
    <h3 class="text-sm font-semibold text-gray-900 leading-tight">
      {{ fund().name }}
    </h3>

    <span [class]="'badge ' + badgeClass()">
      {{ fund().category }}
    </span>
  </div>

  <div class="flex flex-col gap-1">
    <span class="text-xs text-gray-500">Monto mínimo</span>
    <span class="text-lg font-bold text-gray-900">
      {{ fund().minimumAmount | copCurrency }}
    </span>
  </div>

  <div class="mt-auto">
    @if (!isSubscribed()) {
      <button
        class="w-full inline-flex items-center justify-center gap-2 px-5 py-2.5 rounded-lg font-medium text-sm transition-all duration-200 bg-emerald-600 text-white hover:bg-emerald-700 hover:shadow-lg hover:shadow-emerald-200 hover:-translate-y-0.5 cursor-pointer active:translate-y-0 active:shadow-none disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none disabled:shadow-none"
        [disabled]="isLoading()"
        (click)="onSubscribe()"
      >
        @if (isLoading()) {
          <span
            class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"
          ></span>
          Procesando...
        } @else {
          Suscribirse
        }
      </button>
    }

    @if (isSubscribed()) {
      <button class="btn-danger w-full" [disabled]="isLoading()" (click)="onCancel()">
        @if (isLoading()) {
          <span
            class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"
          ></span>
          Procesando...
        } @else {
          Cancelar suscripción
        }
      </button>
    }
  </div>
</div>
